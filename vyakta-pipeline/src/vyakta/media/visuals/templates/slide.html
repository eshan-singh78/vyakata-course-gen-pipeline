<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: {{ width }}px;
      height: {{ height }}px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px;
      position: relative;
      overflow: hidden;
    }
    .brand {
      position: absolute;
      top: 40px;
      left: 60px;
      font-size: 20px;
      color: #00d4aa;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .slide-title {
      font-size: 56px;
      font-weight: 700;
      color: #00d4aa;
      margin-bottom: 50px;
      text-align: center;
      line-height: 1.2;
    }
    .slide-content {
      font-size: 38px;
      line-height: 1.6;
      text-align: center;
      color: #d0d0d0;
      max-width: 1600px;
    }
    .slide-content code {
      background: rgba(0, 212, 170, 0.1);
      padding: 4px 12px;
      border-radius: 6px;
      font-family: 'Fira Code', 'Consolas', monospace;
      color: #00d4aa;
      font-size: 34px;
    }
    .slide-number {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 24px;
      color: #666;
    }
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 6px;
      background: #00d4aa;
      width: {{ progress_percent }}%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="brand">VYAKTA</div>
  <h1 class="slide-title">{{ video_title }}</h1>
  <div class="slide-content">{{ content }}</div>
  <div class="slide-number">{{ slide_number }} / {{ total_slides }}</div>
  <div class="progress-bar"></div>
</body>
</html>
